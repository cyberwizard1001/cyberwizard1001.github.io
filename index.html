<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <link rel="stylesheet" href="https://ui5.sap.com/sdk/resources/sap-ui-core.js">
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/sdk/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_fiori_3"
        data-sap-ui-libs="sap.m"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true">
    </script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        video {
            max-width: 90%;
            border-radius: 15px;
            /* Rounded corners */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .button {
            margin: 20px 0;
            font-size: 16px;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        .list {
            text-align: left;
            margin: 20px;
            background-color: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <h2>WHAT AM I HOLDING?</h2>

    <video id="video" autoplay playsinline></video>
    <p id="result"></p>

    <div class="list">
        <h3>Accepted Classes:</h3>
        <ul>
            <li>RANTAC 300</li>
            <li>Livogen -Z</li>
            <li>BECADEXAMIN - MULTIVITAMIN</li>
            <li>MEFTAL SPAS</li>
            <li>PAN D</li>
            <li>D-RISE 60K</li>
            <li>Allegra</li>
            <li>AUGMENTIN 625 DUO</li>
            <li>PANTOCID DSR</li>
            <li>ZERODOL P</li>
            <li>DOLO 650</li>
        </ul>
    </div>

    <script>
        ////////////////////////////////
        ////////    SPECIFY PARAMETERS
        ////////////////////////////////
        const PROCESSING_SPEED = 100;
        const CLASSES = [
            'RANTAC 300',
            'Livogen -Z',
            'BECADEXAMIN - MULTIVITAMIN',
            'MEFTAL SPAS',
            'PAN D',
            'D-RISE 60K',
            'Allegra',
            'AUGMENTIN 625 DUO',
            'PANTOCID DSR',
            'ZERODOL P',
            'DOLO 650'
        ];
        const MODEL_FOLDER = 'https://cyberwizard1001.github.io/model/model.json';
        const camera_mode = 'environment'; // back camera

        let currentStream;

        ////////////////////////////////
        ////////    USE THIS FUNCTION FOR INTERACTIONS
        ////////////////////////////////
        function interaction(predictedClass, classScores) {
            console.log(classScores);
            document.getElementById("result").innerHTML = `Prediction: ${predictedClass}, Confidence: ${classScores[0]}`;
            document.body.style.backgroundColor = predictedClass === "Allegra" ? "red" : "white";
        }

        ////////////////////////////////
        ////////    VIDEO CAPTURE AND PREDICTION LOGIC
        ////////////////////////////////
        async function startVideo(facingMode = camera_mode) {
            // Stop any existing video tracks to free up the camera
            if (currentStream) {
                currentStream.getTracks().forEach(track => {
                    track.stop();
                });
            }

            try {
                // Request access to the camera with the specified facing mode
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode
                    }
                });

                const videoElement = document.getElementById('video');
                videoElement.srcObject = stream;
                currentStream = stream;

                // Return a promise that resolves when the video is ready to play
                return new Promise(resolve => {
                    videoElement.onloadedmetadata = () => {
                        resolve(videoElement);
                    };
                });
            } catch (err) {
                console.error('Error accessing the camera:', err);
            }
        }

        async function startPredicting() {
            const model = await tf.loadGraphModel(MODEL_FOLDER);
            setInterval(async () => {
                const example = tf.browser.fromPixels(video).cast('float32');
                const prediction = await model.predict(example.expandDims());
                const classScores = await prediction.data();
                const maxScoreId = classScores.indexOf(Math.max(...classScores));
                const predictedClass = CLASSES[maxScoreId];

                interaction(predictedClass, classScores);
            }, PROCESSING_SPEED);
        }

        document.addEventListener("DOMContentLoaded", function () {
            startVideo(camera_mode);
            startPredicting();
        });
    </script>
</body>

</html>
